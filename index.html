<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Behna ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: linear-gradient(135deg, #ff758c, #ff7eb3);
    --text: #fff;
    --card: rgba(255,255,255,0.15);
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    text-align: center;
}

/* CONTAINER */
.container {
    max-width: 700px;
    margin: auto;
    padding: 15px;
}

/* CARD */
.card {
    background: var(--card);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 18px;
    margin-top: 15px;
}

/* BUTTON */
button {
    margin-top: 12px;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(45deg, #ff1e56, #ff4d6d);
    color: white;
    cursor: pointer;
}

/* 🎬 SLIDESHOW FIXED */
.slideshow {
    position: relative;
    width: 100%;
    height: 420px;
    border-radius: 15px;
    overflow: hidden;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease;
}

.slide.active {
    opacity: 1;
}

/* IMAGE (no crop) */
.slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 12px;
    z-index: 2;
}

/* BLUR BG */
.slide::before {
    content: "";
    position: absolute;
    inset: 0;
    background: inherit;
    background-size: cover;
    background-position: center;
    filter: blur(25px);
    transform: scale(1.2);
    z-index: 1;
}

/* FLIP CARDS */
.flip-container {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.flip-card {
    width: 110px;
    height: 110px;
    perspective: 1000px;
}

.flip-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.flip-card.flipped .flip-inner {
    transform: rotateY(180deg);
}

.flip-front, .flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    backface-visibility: hidden;
}

.flip-front { background: #ff4d6d; }
.flip-back { background: white; color: black; transform: rotateY(180deg); }

/* CAKE */
.layer {
    width: 180px;
    height: 50px;
    margin: auto;
    border-radius: 12px;
    margin-top: -12px;
}

.layer1 { background: linear-gradient(#ff9aa2,#ff6f91); }
.layer2 { background: linear-gradient(#ffb7b2,#ff758c); }
.layer3 { background: linear-gradient(#ffdac1,#ff9aa2); }

.candle {
    width: 10px;
    height: 45px;
    background: white;
    margin: auto;
    position: relative;
}

.flame {
    width: 16px;
    height: 22px;
    background: radial-gradient(circle, yellow, orange, red);
    border-radius: 50%;
    position: absolute;
    top: -22px;
    left: -3px;
    animation: flicker 0.15s infinite alternate;
}

/* HEART ANIMATION */
@keyframes floatUp {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-110vh); opacity:0; }
}
</style>
</head>

<body>

<div class="container">

<h1>🎉🎉 Happy Birthday Behna ❤️❤️</h1>

<div class="card">
    <p id="typeText"></p> <!-- 🔥 ADD THIS -->
    <button onclick="start()">Start 🎁</button>
</div>

<!-- 📸 SLIDESHOW -->
<div class="card">
    <div class="slideshow" id="slider">

        <div class="slide active"><img src="image1.jpeg"></div>
        <div class="slide"><img src="image2.jpeg"></div>
        <div class="slide"><img src="image3.jpeg"></div>
        <div class="slide"><img src="image4.jpeg"></div>
        <div class="slide"><img src="image5.jpeg"></div>

    </div>
</div>

<!-- 💌 MESSAGES -->
<div class="card">
<h3>💌 Messages</h3>

<div class="flip-container">

<div class="flip-card" onclick="flipCard(this)">
<div class="flip-inner">
<div class="flip-front">❤️</div>
<div class="flip-back">Keep smiling 😊</div>
</div></div>

<div class="flip-card" onclick="flipCard(this)">
<div class="flip-inner">
<div class="flip-front">🌸</div>
<div class="flip-back">Always Stay Happy 😇</div>
</div></div>

<div class="flip-card" onclick="flipCard(this)">
<div class="flip-inner">
<div class="flip-front">✨</div>
<div class="flip-back">Dream big 🔥</div>
</div></div>

</div>
</div>

<!-- 🎂 CAKE -->
<div class="card">
<h3>🎂 Make a Wish</h3>

<div class="candle">
<div class="flame" id="flame"></div>
</div>

<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>

<button onclick="blow()">Blow Candle 🎂</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// SLIDESHOW BG FIX
let slides = document.querySelectorAll(".slide");

slides.forEach(slide => {
    let img = slide.querySelector("img");
    slide.style.backgroundImage = `url(${img.src})`;
});

// AUTO SLIDE
let index=0;
setInterval(()=>{
    slides[index].classList.remove("active");
    index=(index+1)%slides.length;
    slides[index].classList.add("active");
},3000);

// FLIP
function flipCard(card){
    card.classList.add("flipped");
    setTimeout(()=>card.classList.remove("flipped"),3000);
}

// CAKE
function blow(){
    document.getElementById("flame").style.display="none";
    confetti({particleCount:200,spread:120});
}

// HEARTS
function heart(){
    let h=document.createElement("div");
    h.innerHTML="❤️";
    h.style.position="fixed";
    h.style.left=Math.random()*100+"vw";
    h.style.top="100vh";
    h.style.fontSize=(Math.random()*20+15)+"px";
    h.style.animation="floatUp 5s linear";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}
setInterval(heart,400);

// START
function start(){
    document.getElementById("typeText").innerHTML = ""; // reset
    i = 0;
    typeWriter();

    confetti({
        particleCount:150,
        spread:100
    });
}



// TYPEWRITER CODE (👇 ADD HERE)
const msg = `Happy Birthday pyaari behna ❤️

May God fill your life with lots of joy, happiness, and beautiful moments this year ✨  
Always stay calm, kind, and keep smiling just the way you do 🌸  

You deserve all the happiness in the world 💫  
Love you always ❤️✨`;

let i = 0;

function typeWriter() {
    if (i < msg.length) {
        document.getElementById("typeText").innerHTML += msg.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

// START FUNCTION (make sure this exists)
function start(){
    document.getElementById("typeText").innerHTML = "";
    i = 0;
    typeWriter();

    confetti({
        particleCount:150,
        spread:100
    });
}


</script>

</body>
</html>
